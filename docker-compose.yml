services:
  postgres:
    image: postgres:16-alpine
    container_name: banking-ledger-db
    environment:
      POSTGRES_DB: banking_ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d banking_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: banking-ledger-api
    profiles: ["app"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/banking_ledger
      DATABASE_USERNAME: ledger
      DATABASE_PASSWORD: ledger
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: