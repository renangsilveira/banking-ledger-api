spring:
  application:
    name: banking-ledger-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/banking_ledger}
    username: ${DATABASE_USERNAME:ledger}
    password: ${DATABASE_PASSWORD:ledger}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId:-no-correlation-id}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.example.ledger: DEBUG
