spring:
  application:
    name: banking-ledger-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/banking_ledger}
    username: ${DATABASE_USERNAME:ledger}
    password: ${DATABASE_PASSWORD:ledger}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always